spring.config.activate.on-profile=dev

spring.datasource.url=jdbc:postgresql://localhost:5432/okr_db
spring.datasource.username=postgres
spring.datasource.password=Facil123

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.sql.init.mode=always
spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=true

logging.level.org.springframework=DEBUG

server.port=8001

# JWT Configuration for DEV
app.jwt-expiration-milliseconds=3600000
app.jwt-refresh-expiration-milliseconds=604800000
# Clave por defecto SOLO para desarrollo. En prod se inyecta por variable de entorno.
app.jwt-secret=${JWT_SECRET:ClaveSecretaParaDesarrolloLocal1234567890}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5500}

# Admin User for DEV
app.admin.email=admin@example.com
app.admin.password=admin123
