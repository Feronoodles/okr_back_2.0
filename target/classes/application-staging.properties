spring.config.activate.on-profile=staging

spring.datasource.url=${POSTGRESQL_URL:jdbc:postgresql://localhost:5432/okr_db}
spring.datasource.username=${POSTGRESQL_USER:postgres}
spring.datasource.password=${POSTGRESQL_PASSWORD:Facil123}

spring.jpa.hibernate.ddl-auto=validate

spring.sql.init.mode=always
spring.flyway.clean-disabled=true
spring.flyway.baseline-on-migrate=true

logging.level.org.springframework=INFO

logging.level.com.plcoding=DEBUG
server.port=8002

# JWT Configuration
app.jwt-expiration-milliseconds=3600000
app.jwt-refresh-expiration-milliseconds=604800000
# En staging, JWT_SECRET es obligatorio.
app.jwt-secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Admin User (Optional via Env Vars)
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}
