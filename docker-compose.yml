
services:
  postgres:
    image: postgres:15-alpine
    container_name: okr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-okr_db}
      POSTGRES_USER: ${POSTGRES_USER:-okruser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - okr_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - okr_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-okruser}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: okr_app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRESQL_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-okr_db}
      POSTGRESQL_USER: ${POSTGRES_USER:-okruser}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@okr.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - okr_network
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  okr_postgres_data:

networks:
  okr_network:
    driver: bridge